<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chroma Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="timer" class="hidden">0.00</div>
        <div id="message"></div>

        <div id="ui-layer" class="hidden">
            <div class="slider-pillar">
                <input type="range" id="h-slider" min="0" max="360" value="0">
                <div class="pillar-label">Hue</div>
            </div>
            <div class="slider-pillar">
                <input type="range" id="s-slider" min="0" max="100" value="100">
                <div class="pillar-label">Saturation</div>
            </div>
            <div class="slider-pillar">
                <input type="range" id="l-slider" min="0" max="100" value="50">
                <div class="pillar-label">Brightness</div>
            </div>
            
            <button id="submit-btn">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="black">
                    <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
                </svg>
            </button>
        </div>

        <div id="result-layer" class="split-screen hidden">
            <div id="top-half" class="half">
                <div id="final-score"></div>
                <span class="label-text">Your selection</span>
                <span id="user-vals" class="val-text"></span>
            </div>
            <div id="bottom-half" class="half">
                <span class="label-text">Original</span>
                <span id="target-vals" class="val-text"></span>
                <button id="replay-btn" onclick="location.reload()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="black">
                        <path d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
